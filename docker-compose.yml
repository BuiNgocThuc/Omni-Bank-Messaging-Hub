version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: omnibank-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    networks:
      - omnibank-net

  oracle-db:
    image: oracle23:latest
    container_name: omnibank-oracle
    ports:
      - "1521:1521"
    environment:
      ORACLE_PWD: Oracle123        # SYS / SYSTEM password
      ORACLE_CHARACTERSET: AL32UTF8
    volumes:
      - oracle-data:/opt/oracle/oradata
      - ./oracle-init:/opt/oracle/scripts/startup    # Auto-run SQL scripts on startup
    networks:
      - omnibank-net
    healthcheck:
      test: ["CMD", "sqlplus", "-L", "sys/Oracle123@//localhost:1521/FREEPDB1", "as", "sysdba", "@/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 10

volumes:
  oracle-data:

networks:
  omnibank-net:
    driver: bridge
