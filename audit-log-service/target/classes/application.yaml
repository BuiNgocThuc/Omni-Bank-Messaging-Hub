server:
  port: 8084

spring:
  application:
    name: audit-log-service

  datasource:
    url: jdbc:oracle:thin:@//localhost:1521/FREEPDB1
    username: audit_user
    password: audit123
    driver-class-name: oracle.jdbc.OracleDriver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.OracleDialect
        format_sql: true
        default_schema: AUDIT_USER

  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 5     # Audit có thể xử lý song song nhiều hơn

logging:
  level:
    org.hibernate.SQL: DEBUG
